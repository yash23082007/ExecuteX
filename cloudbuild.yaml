steps:
  # 1. Build the Backend Image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/executex-server', './server']

  # 2. Push Image to GCR
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/executex-server']

  # 3. Deploy Backend to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'executex-server'
      - '--image'
      - 'gcr.io/$PROJECT_ID/executex-server'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'NODE_ENV=production'
      # Secrets from Secret Manager (Step 2 in guide)
      - '--update-secrets'
      - 'MONGO_URI=MONGO_URI:latest'

images:
  - 'gcr.io/$PROJECT_ID/executex-server'
