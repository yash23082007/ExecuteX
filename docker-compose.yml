version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: executex_server
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/executex
      - TEMP_JOBS_VOLUME=executex_temp_jobs
    volumes:
      # Mount the Docker socket so the container can spawn jobs (Docker-out-of-Docker)
      - /var/run/docker.sock:/var/run/docker.sock
      # Shared named volume for job isolation
      - executex_temp_jobs:/app/temp_jobs
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: executex_client
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - server

  mongo:
    image: mongo:6.0
    container_name: executex_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

volumes:
  mongo_data:
  executex_temp_jobs:
    name: executex_temp_jobs
